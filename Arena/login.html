<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HireIQ | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-page__shell" aria-label="Login page">
      <div class="login-page__panel">
        <div class="login-page__brand">
          <div class="login-page__brand-copy">
            <p class="login-page__eyebrow">HireIQ</p>
            <h1 class="login-page__title">Welcome back</h1>
            <p class="login-page__subtitle">Sign in to continue managing hiring workflows.</p>
          </div>
        </div>

        <div class="login-page__status" id="formStatus" role="status" aria-live="polite" hidden></div>

        <form class="login-form" id="loginForm" novalidate>
          <fieldset class="login-form__role-group" aria-label="Account type">
            <!-- <legend class="login-form__role-label">Continue as</legend> -->
            <div class="login-form__role-options">
              <label class="login-form__role-option">
                <input class="login-form__role-input" type="radio" name="accountType" value="student" checked />
                <span class="login-form__role-chip">Student</span>
              </label>
              <label class="login-form__role-option">
                <input class="login-form__role-input" type="radio" name="accountType" value="recruiter" />
                <span class="login-form__role-chip">Recruiter</span>
              </label>
            </div>
          </fieldset>

          <div class="login-form__field">
            <label class="login-form__label" for="email">Email address</label>
            <input class="login-form__input" type="email" id="email" name="email" autocomplete="email" placeholder="you@company.com" required aria-describedby="emailError" />
            <p class="login-form__error" id="emailError" hidden></p>
          </div>

          <div class="login-form__field">
            <label class="login-form__label" for="password">Password</label>
            <div class="login-form__password-wrap">
              <input class="login-form__input login-form__input--password" type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter your password" required aria-describedby="passwordError" />
              <button class="login-form__toggle" type="button" id="togglePassword" aria-label="Show password" aria-pressed="false">Show</button>
            </div>
            <p class="login-form__error" id="passwordError" hidden></p>
          </div>

          <div class="login-form__meta">
            <label class="login-form__remember">
              <input class="login-form__checkbox" type="checkbox" name="rememberMe" />
              <span class="login-form__remember-text">Remember me</span>
            </label>
            <a class="login-form__link" href="#" aria-label="Forgot password">Forgot password?</a>
          </div>

          <button class="login-form__button login-form__button--primary" type="submit" id="loginButton">
            <span class="login-form__button-text">Log in</span>
            <span class="login-form__spinner" aria-hidden="true"></span>
          </button>

          <div class="login-form__divider" aria-hidden="true">
            <span class="login-form__divider-line"></span>
            <span class="login-form__divider-text">or</span>
            <span class="login-form__divider-line"></span>
          </div>

          <button class="login-form__button login-form__button--secondary" type="button" id="googleSignInButton">
            <span class="login-form__google-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path fill="#4285F4" d="M21.35 11.1h-9.17v2.9h5.28c-.23 1.38-.97 2.55-2.09 3.34v2.78h3.39c1.98-1.82 3.12-4.5 3.12-7.67 0-.73-.07-1.43-.21-2.15z"/>
                <path fill="#34A853" d="M12.18 22c2.84 0 5.23-.94 6.97-2.55l-3.39-2.78c-.94.63-2.14 1-3.58 1-2.75 0-5.08-1.86-5.92-4.36H2.76v2.83A10.5 10.5 0 0 0 12.18 22z"/>
                <path fill="#FBBC05" d="M6.26 13.31c-.21-.63-.33-1.3-.33-2s.12-1.37.33-2V6.48H2.76A10.5 10.5 0 0 0 1.67 11.3c0 1.72.41 3.35 1.09 4.82l3.5-2.81z"/>
                <path fill="#EA4335" d="M12.18 5.02c1.55 0 2.93.53 4.03 1.57l3.03-3.03C17.4 1.81 15.01.75 12.18.75 8.24.75 4.84 3 2.76 6.48l3.5 2.83c.84-2.5 3.17-4.29 5.92-4.29z"/>
              </svg>
            </span>
            <span>Continue with Google</span>
          </button>
        </form>
      </div>

      <aside class="login-page__aside" aria-label="Product highlights">
        <div class="login-page__card">
          <div class="login-page__card-glow" aria-hidden="true"></div>
          <img class="login-page__hero-image" src="hireiq-hero.png" alt="HireIQ brand visual" />
          <p class="login-page__card-text">Fast access for recruiters and hiring teams.</p>
        </div>
      </aside>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
